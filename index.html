<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#e07c3c">
<title>每日菜谱</title>
<link rel="manifest" href="manifest.json">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#fdf6ec;--card:#fff;--primary:#e07c3c;--text:#3d2e1c;--sub:#8b7355;--tag-ca:#4a9;--tag-cool:#59b;--tag-spicy:#e85;--tag-home:#c80;--tag-fast:#6a5}
body{font-family:-apple-system,PingFang SC,Hiragino Sans GB,Microsoft YaHei,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden;-webkit-tap-highlight-color:transparent}

/* Top Bar */
.topbar{position:sticky;top:0;z-index:100;background:var(--primary);color:#fff;padding:12px 16px;padding-top:max(12px,env(safe-area-inset-top));display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 8px rgba(0,0,0,.15)}
.topbar h1{font-size:18px;font-weight:600}
.topbar .date{font-size:13px;opacity:.9}
.install-btn{background:#fff;color:var(--primary);border:none;padding:8px 14px;border-radius:18px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.install-btn:active{background:#f0e8d8}

/* Week Switcher */
.week-switcher{display:flex;gap:8px;padding:12px 16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.week-switcher::-webkit-scrollbar{display:none}
.week-btn{flex-shrink:0;padding:6px 16px;border-radius:20px;border:1.5px solid var(--primary);background:#fff;color:var(--primary);font-size:14px;font-weight:500;cursor:pointer;transition:all .2s}
.week-btn.active{background:var(--primary);color:#fff}

/* Day Pills */
.day-pills{display:flex;gap:6px;padding:0 16px 12px;overflow-x:auto;scrollbar-width:none}
.day-pills::-webkit-scrollbar{display:none}
.day-pill{flex-shrink:0;width:48px;height:56px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;cursor:pointer;transition:.2s;border:1.5px solid transparent;background:#fff;color:var(--text)}
.day-pill .dow{font-weight:600;font-size:13px}
.day-pill .dom{opacity:.6}
.day-pill.today{border-color:var(--primary);background:#fff8f0}
.day-pill.active{background:var(--primary);color:#fff}
.day-pill.active .dom{opacity:.8}

/* Meal Cards */
.content{padding:0 16px 80px}
.day-title{font-size:20px;font-weight:700;margin:8px 0 14px;display:flex;align-items:center;gap:10px}
.day-cost{font-size:14px;font-weight:400;color:var(--primary);background:#fff0e8;padding:2px 10px;border-radius:12px}
.meal-card{background:var(--card);border-radius:16px;padding:16px;margin-bottom:14px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
.meal-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.meal-label{font-size:13px;font-weight:700;padding:3px 10px;border-radius:10px;display:inline-block}
.meal-label.breakfast{background:#fff3cd;color:#b8860b}
.meal-label.lunch{background:#ffe0d0;color:#c0392b}
.meal-label.dinner{background:#d8e9ff;color:#2471a3}
.meal-name{font-size:16px;font-weight:600;margin:8px 0 4px}
.meal-cost{font-size:13px;color:var(--sub)}
.meal-tags{display:flex;gap:6px;flex-wrap:wrap;margin:6px 0}
.tag{font-size:11px;padding:2px 8px;border-radius:8px;background:#f5f0e8}
.tag.ca{background:#e0f5ec;color:#2d7d5f}
.tag.cool{background:#e0ecf7;color:#2d5f8d}
.tag.spicy{background:#fde8e0;color:#b8452d}

/* Dish items */
.dish{border-top:1px solid #f0ebe0;padding:10px 0}
.dish:first-of-type{border-top:none}
.dish-name{font-size:15px;font-weight:600;color:var(--text);cursor:pointer;display:flex;justify-content:space-between;align-items:center}
.dish-name::after{content:'▼';font-size:10px;transition:.3s;color:#ccc}
.dish.open .dish-name::after{transform:rotate(180deg)}
.dish-body{display:none;padding-top:8px}
.dish.open .dish-body{display:block}
.ingredients{margin:8px 0}
.ing-title,.step-title{font-size:12px;font-weight:600;color:var(--sub);margin-bottom:4px}
.ing-list{display:flex;flex-wrap:wrap;gap:4px 10px}
.ing-item{font-size:13px;display:flex;gap:4px}
.ing-name{color:var(--text)}
.ing-amount{color:var(--sub)}
.steps{list-style:none;padding:0}
.steps li{font-size:13px;padding:4px 0;padding-left:20px;position:relative;color:#555;line-height:1.5}
.steps li::before{content:attr(data-n);position:absolute;left:0;color:var(--primary);font-weight:700;font-size:11px}
.note{font-size:12px;color:var(--primary);background:#fff8f3;padding:6px 10px;border-radius:8px;margin-top:8px;line-height:1.5}

/* Empty */
.empty{text-align:center;padding:60px 20px;color:var(--sub)}
.empty .icon{font-size:48px}
.empty p{margin-top:12px;font-size:15px}

/* Bottom */
.bottom{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid #eee;padding:8px 16px;padding-bottom:max(8px,env(safe-area-inset-bottom));display:flex;justify-content:space-around;font-size:11px;color:var(--sub)}
.bottom .stat{text-align:center}
.bottom .stat strong{display:block;font-size:16px;color:var(--text)}
</style>
</head>

    {name:"凉拌木耳黄瓜",ing:[["木耳(干)","20克"],["黄瓜","1根"]],steps:["木耳焯水+黄瓜拍碎+蒜泥+调料"]}
  ]},dinner:{name:"紫菜蛋花汤 + 蒸饺 + 蒜蓉蒸茄子 + 凉拌黄瓜",cost:18,tags:["⚡快手","❄️消暑"],dishes:[
    {name:"蒸饺+蒸茄子+紫菜汤",ing:[["速冻饺子","1袋"],["茄子","2根"],["紫菜+鸡蛋","各适量"],["黄瓜","2根"]],steps:["饺子蒸10-12分钟；茄子一起蒸+蒜泥","紫菜蛋花汤；黄瓜拍碎凉拌"]}
  ]}}
];

// ============ APP STATE ============
let currentWeek = 1;
let currentIdx = 0;
let touchX = 0;

// ============ HELPERS ============
function today() { return new Date().toISOString().split('T')[0]; }
function fmtDate(d) { const [y,m,d_] = d.split('-'); return `${parseInt(m)}月${parseInt(d_)}日`; }

function findTodayIdx() {
  const t = today();
  const idx = MENU.findIndex(m => m.date === t);
  return idx >= 0 ? idx : 0;
}

function filterByWeek(w) {
  return MENU.reduce((acc,m,i) => { if(m.week===w) acc.push(i); return acc; },[]);
}

// ============ RENDER ============
function renderWeekSwitcher() {
  const el = document.getElementById('weekSwitcher');
  el.innerHTML = [1,2].map(w =>
    `<button class="week-btn${w===currentWeek?' active':''}" onclick="switchWeek(${w})">📅 第${w}周</button>`
  ).join('');
}

function renderDayPills() {
  const el = document.getElementById('dayPills');
  const indices = filterByWeek(currentWeek);
  const t = today();
  el.innerHTML = indices.map((idx,i) => {
    const m = MENU[idx];
    const isToday = m.date === t;
    const isActive = idx === currentIdx;
    return `<div class="day-pill${isToday?' today':''}${isActive?' active':''}"
      onclick="selectDay(${idx})">
      <span class="dow">${m.dow}</span>
      <span class="dom">${m.date.split('-')[2]}日</span>
    </div>`;
  }).join('');
  // Scroll active into view
  setTimeout(() => {
    const active = document.querySelector('.day-pill.active');
    if(active) active.scrollIntoView({behavior:'smooth',inline:'center'});
  },100);
}

function renderContent() {
  const m = MENU[currentIdx];
  if(!m) { document.getElementById('content').innerHTML='<div class="empty"><div class="icon">📭</div><p>暂无菜单数据</p></div>'; return; }

  const meals = [
    {key:'breakfast',label:'🌅 早餐',cls:'breakfast'},
    {key:'lunch',label:'☀️ 午餐',cls:'lunch'},
    {key:'dinner',label:'🌙 晚餐',cls:'dinner'}
  ];

  const dayTotal = meals.reduce((sum,{key}) => sum + (m[key]?.cost||0), 0);

  let html = `<div class="day-title">${m.dow} ${fmtDate(m.date)}<span class="day-cost">💰 ¥${dayTotal}</span></div>`;

  meals.forEach(({key,label,cls}) => {
    const meal = m[key];
    if(!meal) return;
    html += `<div class="meal-card">
      <span class="meal-label ${cls}">${label}</span>
      <div class="meal-name">${meal.name}</div>
      <div class="meal-cost">¥${meal.cost}</div>`;
    if(meal.tags && meal.tags.length) {
      html += `<div class="meal-tags">${meal.tags.map(t => {
        let c = '';
        if(t.includes('钙')) c='ca';
        if(t.includes('消暑')||t.includes('凉')) c='cool';
        if(t.includes('辣')) c='spicy';
        return `<span class="tag ${c}">${t}</span>`;
      }).join('')}</div>`;
    }
    meal.dishes.forEach((d,i) => {
      html += `<div class="dish" id="dish-${key}-${i}" onclick="toggleDish('${key}',${i})">
        <div class="dish-name"><span>${d.name}</span></div>
        <div class="dish-body">
          ${d.ing && d.ing.length ? `
          <div class="ingredients">
            <div class="ing-title">🛒 食材</div>
            <div class="ing-list">${d.ing.map(([n,a]) => `<div class="ing-item"><span class="ing-name">${n}</span><span class="ing-amount">${a}</span></div>`).join('')}</div>
          </div>` : ''}
          ${d.steps && d.steps.length ? `
          <div>
            <div class="step-title">📝 做法</div>
            <ol class="steps">${d.steps.map((s,i) => `<li data-n="${i+1}.">${s}</li>`).join('')}</ol>
          </div>` : ''}
          ${d.note ? `<div class="note">${d.note}</div>` : ''}
        </div>
      </div>`;
    });
    html += `</div>`;
  });

  document.getElementById('content').innerHTML = html;

  // Update bottom stats
  document.getElementById('bottom').innerHTML = `
    <div class="stat"><strong>${dayTotal}</strong>今日预算</div>
    <div class="stat"><strong>${m.week}</strong>第几周</div>
    <div class="stat"><strong>${m.dow}</strong>星期</div>
  `;

  document.getElementById('todayLabel').textContent = '📅 ' + fmtDate(m.date) + ' ' + m.dow;
}

function toggleDish(key, i) {
  const dish = document.getElementById(`dish-${key}-${i}`);
  if(dish) dish.classList.toggle('open');
}

function selectDay(idx) {
  currentIdx = idx;
  currentWeek = MENU[idx].week;
  renderAll();
  document.getElementById('content').scrollIntoView({behavior:'smooth'});
}

function switchWeek(w) {
  currentWeek = w;
  const indices = filterByWeek(w);
  currentIdx = indices[0];
  renderAll();
  document.getElementById('content').scrollIntoView({behavior:'smooth'});
}

function renderAll() {
  renderWeekSwitcher();
  renderDayPills();
  renderContent();
}

// ============ SWIPE ============
document.addEventListener('touchstart', e => { touchX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchX;
  if(Math.abs(dx) < 50) return;
  const indices = filterByWeek(currentWeek);
  const pos = indices.indexOf(currentIdx);
  if(dx < 0 && pos < indices.length-1) selectDay(indices[pos+1]);
  if(dx > 0 && pos > 0) selectDay(indices[pos-1]);
});

// ============ KEYBOARD ============
document.addEventListener('keydown', e => {
  const indices = filterByWeek(currentWeek);
  const pos = indices.indexOf(currentIdx);
  if(e.key === 'ArrowRight' && pos < indices.length-1) selectDay(indices[pos+1]);
  if(e.key === 'ArrowLeft' && pos > 0) selectDay(indices[pos-1]);
});

// ============ INIT ============
currentIdx = findTodayIdx();
currentWeek = MENU[currentIdx].week;
renderAll();

// Auto-open first dish per meal for today
setTimeout(() => {
  ['breakfast','lunch','dinner'].forEach(key => {
    const meal = MENU[currentIdx]?.[key];
    if(meal && meal.dishes.length) toggleDish(key, 0);
  });
}, 300);

// ============ PWA INSTALL ============
let deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;
  const btn = document.getElementById('installBtn');
  if(btn) btn.style.display = 'block';
});

window.addEventListener('appinstalled', () => {
  deferredPrompt = null;
  const btn = document.getElementById('installBtn');
  if(btn) btn.style.display = 'none';
  console.log('App installed!');
});

function installApp() {
  if(!deferredPrompt) {
    alert('安装功能暂不可用。请尝试：\n\n1. Chrome浏览器右上角 ⋮ → 添加到主屏幕\n2. 或刷新页面后再试');
    return;
  }
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then((r) => {
    if(r.outcome === 'accepted') {
      document.getElementById('installBtn').style.display = 'none';
    }
    deferredPrompt = null;
  });
}

// Register Service Worker
if('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').then(() => {
    console.log('SW registered');
  }).catch(() => {});
}
</script>
</body>
</html>
